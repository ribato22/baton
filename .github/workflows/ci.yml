name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (no network; integration tests skipped by default)
        run: uv run pytest --cov=src/baton --cov=eval --cov-report=term-missing

  build:
    name: build & package smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Check package metadata (twine)
        run: uvx twine check dist/*

      - name: Wheel-install smoke test
        # Catches packaging regressions a unit test can't (accidental webui/ or docs/
        # inclusion, a broken `baton` console-script entrypoint, missing dependency
        # metadata) by installing the built wheel into a throwaway venv — separate
        # from the dev environment `uv sync --dev` builds for the test job above.
        run: |
          python3 -m venv /tmp/baton-wheel-venv
          /tmp/baton-wheel-venv/bin/pip install --quiet dist/*.whl
          /tmp/baton-wheel-venv/bin/baton --version
          /tmp/baton-wheel-venv/bin/baton --help
