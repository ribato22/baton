name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy; enforces the shipped py.typed promise)
        run: uv run mypy src/baton

      - name: Test (no network; integration tests skipped by default)
        run: uv run pytest --cov=src/baton --cov=eval --cov-report=term-missing

  build:
    name: build & package smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Check package metadata (twine)
        run: uvx twine check dist/*

      - name: Wheel-install smoke test
        # Catches packaging regressions a unit test can't (accidental webui/ or docs/
        # inclusion, a broken `baton` console-script entrypoint, missing dependency
        # metadata) by installing the built wheel into a throwaway venv — separate
        # from the dev environment `uv sync --dev` builds for the test job above.
        run: |
          python3 -m venv /tmp/baton-wheel-venv
          /tmp/baton-wheel-venv/bin/pip install --quiet dist/*.whl
          /tmp/baton-wheel-venv/bin/baton --version
          /tmp/baton-wheel-venv/bin/baton --help
