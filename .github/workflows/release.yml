name: Release

# Tag-triggered publish to PyPI via Trusted Publishing (OIDC) - no API token stored
# in this repo. NOTE: this only works once the repo is public on GitHub AND a
# "trusted publisher" for this repo/workflow is configured on the PyPI project
# settings (https://docs.pypi.org/trusted-publishers/); until then, pushing a v*
# tag will build correctly but the publish step will fail at the PyPI end.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Check package metadata (twine)
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/baton/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
